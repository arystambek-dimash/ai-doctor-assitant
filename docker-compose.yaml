services:
  backend_service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    container_name: doctor_backend
    restart: unless-stopped
    depends_on:
      database_service:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  database_service:
    image: postgres:16-alpine
    container_name: doctor_database
    restart: unless-stopped
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - local
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pg_data:

networks:
  local:
    driver: bridge